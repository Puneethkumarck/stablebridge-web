openapi: 3.1.0
info:
  title: S11 Merchant Onboarding API
  description: "Merchant onboarding, KYB verification, and lifecycle management"
  contact:
    name: StableBridge Platform
  version: 1.0.0
servers:
- url: http://localhost/onboarding
  description: NGINX Ingress (Kind cluster)
paths:
  /api/v1/merchants:
    get:
      tags:
      - merchant-controller
      summary: List merchants with pagination and optional status filter
      operationId: listMerchants
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - APPLIED
          - KYB_IN_PROGRESS
          - KYB_MANUAL_REVIEW
          - KYB_REJECTED
          - PENDING_APPROVAL
          - ACTIVE
          - SUSPENDED
          - CLOSED
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageResponseMerchantResponse"
    post:
      tags:
      - merchant-controller
      operationId: apply
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantApplicationRequest"
        required: true
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantApplicationResponse"
  /api/v1/merchants/{merchantId}/suspend:
    post:
      tags:
      - merchant-controller
      operationId: suspend
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuspendMerchantRequest"
        required: true
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "202":
          description: Accepted
  /api/v1/merchants/{merchantId}/reactivate:
    post:
      tags:
      - merchant-controller
      operationId: reactivate
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "202":
          description: Accepted
  /api/v1/merchants/{merchantId}/kyb/start:
    post:
      tags:
      - merchant-controller
      operationId: startKyb
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "202":
          description: Accepted
  /api/v1/merchants/{merchantId}/documents:
    post:
      tags:
      - merchant-controller
      operationId: uploadDocument
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUploadRequest"
        required: true
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DocumentUploadResponse"
  /api/v1/merchants/{merchantId}/corridors:
    post:
      tags:
      - merchant-controller
      operationId: approveCorridor
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Approved-By
        in: header
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveCorridorRequest"
        required: true
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CorridorResponse"
  /api/v1/merchants/{merchantId}/close:
    post:
      tags:
      - merchant-controller
      operationId: close
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseMerchantRequest"
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "202":
          description: Accepted
  /api/v1/merchants/{merchantId}/activate:
    post:
      tags:
      - merchant-controller
      operationId: activate
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateMerchantRequest"
        required: true
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantResponse"
  /api/internal/webhooks/onfido:
    post:
      tags:
      - kyb-webhook-controller
      operationId: handleOnfidoWebhook
      parameters:
      - name: X-SHA2-Signature
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "200":
          description: OK
  /api/v1/merchants/{merchantId}:
    get:
      tags:
      - merchant-controller
      operationId: findById
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantResponse"
    patch:
      tags:
      - merchant-controller
      operationId: updateMerchant
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMerchantRequest"
        required: true
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantResponse"
  /api/v1/merchants/{merchantId}/rate-limit-tier:
    patch:
      tags:
      - merchant-controller
      operationId: updateRateLimitTier
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRateLimitTierRequest"
        required: true
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantResponse"
  /api/v1/merchants/{merchantId}/kyb:
    get:
      tags:
      - merchant-controller
      operationId: getKybStatus
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unprocessable Content
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/KybStatusResponse"
components:
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
        status:
          type: string
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    BeneficialOwnerDto:
      type: object
      properties:
        fullName:
          type: string
          minLength: 1
        dateOfBirth:
          type: string
          format: date
        nationality:
          type: string
          minLength: 1
        ownershipPct:
          type: number
          maximum: 100.00
          minimum: 0.01
        isPoliticallyExposed:
          type: boolean
        nationalIdRef:
          type: string
      required:
      - dateOfBirth
      - ownershipPct
    BusinessAddressDto:
      type: object
      properties:
        streetLine1:
          type: string
          minLength: 1
        streetLine2:
          type: string
        city:
          type: string
          minLength: 1
        stateProvince:
          type: string
        postcode:
          type: string
          minLength: 1
        country:
          type: string
          maxLength: 2
          minLength: 2
    MerchantApplicationRequest:
      type: object
      properties:
        legalName:
          type: string
          minLength: 1
        tradingName:
          type: string
          minLength: 1
        registrationNumber:
          type: string
          minLength: 1
        registrationCountry:
          type: string
          maxLength: 2
          minLength: 2
        entityType:
          type: string
          minLength: 1
        websiteUrl:
          type: string
          minLength: 1
        primaryCurrency:
          type: string
          maxLength: 3
          minLength: 3
        primaryContactEmail:
          type: string
          minLength: 1
        primaryContactName:
          type: string
          minLength: 1
        registeredAddress:
          $ref: "#/components/schemas/BusinessAddressDto"
        beneficialOwners:
          type: array
          items:
            $ref: "#/components/schemas/BeneficialOwnerDto"
          minItems: 1
        requestedCorridors:
          type: array
          items:
            type: string
          minItems: 1
      required:
      - registeredAddress
    MerchantApplicationResponse:
      type: object
      properties:
        merchantId:
          type: string
          format: uuid
        status:
          type: string
        kybStatus:
          type: string
        legalName:
          type: string
        createdAt:
          type: string
          format: date-time
    SuspendMerchantRequest:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
        suspendedBy:
          type: string
          format: uuid
    DocumentUploadRequest:
      type: object
      properties:
        documentType:
          type: string
          minLength: 1
        fileName:
          type: string
          minLength: 1
    DocumentUploadResponse:
      type: object
      properties:
        uploadUrl:
          type: string
        expiresAt:
          type: string
          format: date-time
    ApproveCorridorRequest:
      type: object
      properties:
        sourceCountry:
          type: string
          maxLength: 2
          minLength: 2
        targetCountry:
          type: string
          maxLength: 2
          minLength: 2
        currencies:
          type: array
          items:
            type: string
          minItems: 1
        maxAmountUsd:
          type: number
          minimum: 1.00
        expiresAt:
          type: string
          format: date-time
      required:
      - expiresAt
      - maxAmountUsd
    CorridorResponse:
      type: object
      properties:
        corridorId:
          type: string
          format: uuid
        merchantId:
          type: string
          format: uuid
        sourceCountry:
          type: string
        targetCountry:
          type: string
        currencies:
          type: array
          items:
            type: string
        maxAmountUsd:
          type: number
        approvedBy:
          type: string
          format: uuid
        approvedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        active:
          type: boolean
    CloseMerchantRequest:
      type: object
      properties:
        reason:
          type: string
        closedBy:
          type: string
          format: uuid
    ActivateMerchantRequest:
      type: object
      properties:
        approvedBy:
          type: string
          format: uuid
        scopes:
          type: array
          items:
            type: string
          minItems: 1
      required:
      - approvedBy
    MerchantResponse:
      type: object
      properties:
        merchantId:
          type: string
          format: uuid
        legalName:
          type: string
        tradingName:
          type: string
        registrationNumber:
          type: string
        registrationCountry:
          type: string
        entityType:
          type: string
        websiteUrl:
          type: string
        primaryCurrency:
          type: string
        primaryContactEmail:
          type: string
        primaryContactName:
          type: string
        status:
          type: string
        kybStatus:
          type: string
        riskTier:
          type: string
        rateLimitTier:
          type: string
        allowedScopes:
          type: array
          items:
            type: string
        requestedCorridors:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        activatedAt:
          type: string
          format: date-time
    UpdateMerchantRequest:
      type: object
      properties:
        tradingName:
          type: string
        websiteUrl:
          type: string
        registeredAddress:
          $ref: "#/components/schemas/BusinessAddressDto"
    UpdateRateLimitTierRequest:
      type: object
      properties:
        newTier:
          type: string
          minLength: 1
        updatedBy:
          type: string
          format: uuid
      required:
      - updatedBy
    Page:
      type: object
      properties:
        number:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
    PageResponseMerchantResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MerchantResponse"
        page:
          $ref: "#/components/schemas/Page"
    KybStatusResponse:
      type: object
      properties:
        kybId:
          type: string
          format: uuid
        status:
          type: string
        provider:
          type: string
        providerRef:
          type: string
        initiatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        riskSignals:
          type: object
          additionalProperties:
            type: object
