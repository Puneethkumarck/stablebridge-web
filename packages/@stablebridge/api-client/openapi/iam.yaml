          type: string
          format: uuid
        status:
          type: string
        suspendedAt:
          type: string
          format: date-time
    DataResponseReactivateUserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ReactivateUserResponse'
    ReactivateUserResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        status:
          type: string
        activatedAt:
          type: string
          format: date-time
    DataResponseMfaSetupResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MfaSetupResponse'
    MfaSetupResponse:
      type: object
      properties:
        secret:
          type: string
        provisioningUri:
          type: string
    MfaActivateRequest:
      type: object
      properties:
        secret:
          type: string
          minLength: 1
        totpCode:
          type: string
          minLength: 1
    InviteUserRequest:
      type: object
      properties:
        email:
          type: string
          minLength: 1
        fullName:
          type: string
          minLength: 1
        roleId:
          type: string
          format: uuid
      required:
      - roleId
    DataResponseInvitationResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/InvitationResponse'
    InvitationResponse:
      type: object
      properties:
        invitationId:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
        status:
          type: string
        expiresAt:
          type: string
          format: date-time
        invitedBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    CreateRoleRequest:
      type: object
      properties:
        roleName:
          type: string
          maxLength: 50
          minLength: 2
        description:
          type: string
          maxLength: 255
          minLength: 0
        permissions:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
    DataResponseRoleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/RoleResponse'
    RoleResponse:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
        roleName:
          type: string
        description:
          type: string
        builtin:
          type: boolean
        active:
          type: boolean
        userCount:
          type: integer
          format: int64
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MfaVerifyRequest:
      type: object
      properties:
        mfaChallengeId:
          type: string
          minLength: 1
        totpCode:
          type: string
          minLength: 1
          pattern: \d{6}
    DataResponseLoginResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/LoginResponse'
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int32
        user:
          $ref: '#/components/schemas/UserInfo'
    UserInfo:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        merchantId:
          type: string
          format: uuid
        fullName:
          type: string
        role:
          type: string
        permissions:
          type: array
          items:
            type: string
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    DataResponseObject:
      type: object
      properties:
        data:
          type: object
    AcceptInvitationRequest:
      type: object
      properties:
        fullName:
          type: string
          minLength: 1
        password:
          type: string
          maxLength: 2147483647
          minLength: 12
    DataResponseUserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/UserResponse'
    RoleSummary:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
        roleName:
          type: string
    UserResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        merchantId:
          type: string
          format: uuid
        email:
          type: string
        fullName:
          type: string
        role:
          $ref: '#/components/schemas/RoleSummary'
        status:
          type: string
        mfaEnabled:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
        activatedAt:
          type: string
          format: date-time
        suspendedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
    DataResponseRefreshTokenResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/RefreshTokenResponse'
    RefreshTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
          format: int32
    ChangeUserRoleRequest:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
      required:
      - roleId
    ChangeRoleResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        oldRole:
          type: string
        newRole:
          type: string
        changedAt:
          type: string
          format: date-time
        changedBy:
          type: string
          format: uuid
    DataResponseChangeRoleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ChangeRoleResponse'
    UpdateRoleRequest:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
    Page:
      type: object
      properties:
        number:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
    PageResponseUserResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        page:
          $ref: '#/components/schemas/Page'
    PageResponseRoleResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/RoleResponse'
        page:
          $ref: '#/components/schemas/Page'
    DataResponsePermissionCheckResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PermissionCheckResponse'
    PermissionCheckResponse:
      type: object
      properties:
